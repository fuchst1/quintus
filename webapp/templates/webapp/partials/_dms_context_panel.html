{% if dms_context_panel %}
<div class="card border-0 shadow-sm {% if not dms_context_panel_inline %}mt-4{% endif %}">
    <div class="card-body {% if dms_context_panel_inline %}p-3{% else %}p-4{% endif %}">
        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
            <div>
                <h5 class="mb-1">{{ dms_context_panel.title }}</h5>
                <div class="text-muted small mb-2">{{ dms_context_panel.description }}</div>
                <div class="fw-semibold mb-2">{{ dms_context_panel.source_label }}</div>
                {% if dms_context_panel.filters %}
                <div class="d-flex flex-wrap gap-2">
                    {% for item in dms_context_panel.filters %}
                    <span class="badge rounded-pill text-bg-light border">{{ item.label }}: {{ item.value }}</span>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
            <a href="{{ dms_context_panel.open_url }}" class="btn btn-primary">
                <i class="bi bi-folder2-open me-1"></i>
                Im DMS öffnen
            </a>
        </div>
    </div>
</div>
{% endif %}
